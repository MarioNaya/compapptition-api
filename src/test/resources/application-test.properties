# ======================================================
# Profile de TEST — sobreescribe application.properties
# No necesita MySQL ni .env
# ======================================================

# Deshabilitar importación de .env
spring.config.import=

# --- Base de datos: H2 en memoria ---
spring.datasource.url=jdbc:h2:mem:compapption_test;MODE=MySQL;DB_CLOSE_DELAY=-1;NON_KEYWORDS=VALUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# --- JWT (hardcoded para tests, clave de 64 bytes / 512 bits) ---
jwt.secret=dGVzdC1zZWNyZXQtY29tcGFwcHRpb24ta2V5LWZvci1qdW5pdDUtdGVzdGluZy1zdWl0ZS01MTItYml0cy0hIQ==
jwt.access-token-expiration=3600000
jwt.refresh-token-expiration=86400000

# --- Mail deshabilitado ---
spring.mail.host=localhost
spring.mail.port=3025
spring.mail.username=test
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.starttls.required=false

# --- App ---
app.frontend-url=http://localhost:4200
app.invitation-expiration-days=7

# --- Logging reducido en tests ---
logging.level.root=WARN
logging.level.com.compapption.api=WARN
logging.level.org.springframework.security=WARN
